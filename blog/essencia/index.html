<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../favicon_io/favicon.ico">
    <title>Blog La Quinta Essència - El Árbol de las Flores Negras</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="blog-list-page" data-blog="essencia">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-links">
                <a href="../..">← Inicio</a>
                <a href="../../blog/disco/">Blog Disco</a>
                <a href="../../blog/essencia/">Blog La Quinta Essència</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Tema: Auto" title="Tema: Auto (clic para cambiar)"></button>
        </div>
    </nav>

    <div class="banner-prologo">
        <div class="banner-prologo__contenido">
            <div class="banner-prologo__texto">
            <h2 class="banner-prologo__titulo">
                <span class="banner-prologo__icono">⚗️</span> 
                La Quinta Essència
            </h2>
            <p class="banner-prologo__descripcion">
                Descobreix la història de la mestra Elyria i l'inici de l'aventura dels alquimistes!
            </p>
            </div>
            <div class="banner-prologo__accion">
            <a href="https://marcramos.github.io/proleg-interactiu/" class="banner-prologo__boton" aria-label="Accedir al pròleg interactiu" target="_blank">
                Accedir al pròleg interactiu <span class="banner-prologo__flecha">→</span>
            </a>
            </div>
        </div>
    </div>

    <div class="blog-layout">
        
        <aside class="blog-sidebar">
            <h2 class="sidebar-title">⚗️ Navegar pel blog</h2>
            <div id="blog-nav"></div>
        </aside>

        <main class="blog-main">
            <section class="blog-list-section">
                <div class="container">
                    <p class="blog-description">Segueix el procés creatiu del joc de taula.</p>
                    <h1 class="section-title">🔥 La Quinta Essència</h1>
                    <!-- Lista dinámica de artículos -->
                    <div id="blog-list"></div>
                </div>
            </section>
        </main>
    </div>

    <footer>
        <div class="container">
            <p>© <span id="current-year"></span> Marc Ramos Bruach</p>
        </div>
    </footer>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/blog-data.js"></script>
    <script src="../../assets/js/blog-manager.js"></script>
    <script src="../../assets/js/current-year.js"></script>
</body>
</html>
